name: Report a spec error
description: Queue a correction for an existing catalog spec.
title: "Spec error: <spec id>"
labels: ["needs-review"]
body:
  - type: input
    id: spec_id
    attributes:
      label: Spec ID
      description: "Found in the spec page's `spec_id:` frontmatter (e.g. `admin/magewell-pro-convert-series`) or printed by the `ai4av-lookup` skill."
      placeholder: admin/magewell-pro-convert-series
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Issue category
      options:
        - command mismatch
        - missing command
        - transport/protocol mismatch
        - firmware coverage
        - provenance/source
        - other
    validations:
      required: true
  - type: input
    id: firmware_protocol
    attributes:
      label: Firmware or protocol version
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include observed behavior and public source links. Do not paste private or copied source material.
    validations:
      required: true
