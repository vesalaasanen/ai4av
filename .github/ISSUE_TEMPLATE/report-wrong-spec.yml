name: Report wrong spec
description: Queue a correction for an existing catalog spec.
title: "Correction: <spec id or device>"
labels: ["needs-review"]
body:
  - type: input
    id: spec_id
    attributes:
      label: Spec ID or device
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Issue category
      options:
        - command mismatch
        - missing command
        - transport/protocol mismatch
        - firmware coverage
        - provenance/source
        - other
    validations:
      required: true
  - type: input
    id: firmware_protocol
    attributes:
      label: Firmware or protocol version
  - type: textarea
    id: details
    attributes:
      label: Details
      description: Include observed behavior and public source links. Do not paste private or copied source material.
    validations:
      required: true
