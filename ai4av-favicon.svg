<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 360 360">
  <!-- AI4AV favicon / small-icon: frame only, no letters. Solo edges are
       solid; the shared top-left L keeps the green/blue interleave (each
       color fills the other's gaps). All green is drawn first, then all
       blue, so the solid blue divider caps cleanly over the interleave. -->
  <g stroke-width="20" stroke-linecap="butt">
    <!-- green: solid bottom / right / top-right run -->
    <line x1="-10" y1="160" x2="330" y2="160" stroke="#2F9E44"/>
    <line x1="320" y1="-10" x2="320" y2="170" stroke="#2F9E44"/>
    <line x1="170" y1="0" x2="330" y2="0" stroke="#2F9E44"/>
    <!-- green: interleaved top-left L -->
    <line x1="-10" y1="0" x2="170" y2="0" stroke="#2F9E44" stroke-dasharray="20 20" stroke-dashoffset="0"/>
    <line x1="0" y1="-10" x2="0" y2="170" stroke="#2F9E44" stroke-dasharray="20 20" stroke-dashoffset="0"/>
    <!-- blue: solid bottom / right / lower-left run -->
    <line x1="-10" y1="320" x2="170" y2="320" stroke="#2563EB"/>
    <line x1="160" y1="-10" x2="160" y2="330" stroke="#2563EB"/>
    <line x1="0" y1="170" x2="0" y2="330" stroke="#2563EB"/>
    <!-- blue: interleaved top-left L -->
    <line x1="-10" y1="0" x2="170" y2="0" stroke="#2563EB" stroke-dasharray="20 20" stroke-dashoffset="20"/>
    <line x1="0" y1="-10" x2="0" y2="170" stroke="#2563EB" stroke-dasharray="20 20" stroke-dashoffset="20"/>
  </g>
</svg>
